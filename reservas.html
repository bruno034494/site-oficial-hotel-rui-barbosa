<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservas - Hotel Rui Barbosa</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37;
            --light: #f4f4f4;
            --danger: #e74c3c;
            --info: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        /* --- LOGO ALINHADA À ESQUERDA COM O TÍTULO --- */
        .header-reserva {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 15px;
        }

        .logo-hotel {
            width: 80px; 
            height: 80px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid var(--accent); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }

        .header-reserva h2 {
            color: var(--primary);
            margin: 0;
            font-size: 1.8rem;
            line-height: 1.2;
        }

        .form-group { margin-bottom: 1rem; }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
        }

        input[type="text"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
        }

        .price-display {
            background: #e8f4fd;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
        }

        .btn-reservar {
            width: 100%;
            padding: 12px;
            background-color: #25d366;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 15px;
        }

        .btn-reservar:hover { background-color: #128c7e; }
        
        .btn-reservar:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .info-section {
            border-top: 1px solid #eee;
            padding-top: 15px;
            margin-top: 15px;
            text-align: center;
        }

        .btn-info {
            background-color: transparent;
            color: var(--info);
            border: 1px solid var(--info);
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 5px;
            transition: 0.3s;
        }

        .btn-info:hover {
            background-color: var(--info);
            color: white;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div class="header-reserva">
        <img src="538039459_17955489224988515_3782912898807194527_n.jpg" alt="Logo Hotel Rui Barbosa" class="logo-hotel">
        <h2>Hotel Rui Barbosa</h2>
    </div>

    <form id="reservaForm">
        <div class="form-group">
            <label for="nome">Nome / Razão Social:</label>
            <input type="text" id="nome" placeholder="Ex: João da Silva">
        </div>

        <div class="form-group">
            <label>Tipo de Documento:</label>
            <div class="radio-group">
                <label><input type="radio" name="tipoDoc" value="CPF" checked onchange="verificarDocumento()"> CPF</label>
                <label><input type="radio" name="tipoDoc" value="CNPJ" onchange="verificarDocumento()"> CNPJ</label>
            </div>
        </div>

        <div class="form-group">
            <label id="labelDocumento" for="documento">CPF:</label>
            <input type="text" id="documento" required placeholder="000.000.000-00" maxlength="14">
        </div>

        <div class="form-group" id="divNotaFiscal" style="display: none;">
            <label for="notaFiscal">Deseja emissão de Nota Fiscal?</label>
            <select id="notaFiscal">
                <option value="Não">Não</option>
                <option value="Sim">Sim, enviar para o WhatsApp</option>
            </select>
        </div>

        <div class="form-group">
            <label for="endereco">Endereço Completo:</label>
            <input type="text" id="endereco" placeholder="Rua, Número, Bairro, Cidade - UF">
        </div>

        <div class="form-group">
            <label for="tipoQuarto">Tipo de Quarto:</label>
            <select id="tipoQuarto">
                <option value="130" selected>Casal - R$ 130,00</option>
                <option value="80">Solteiro - R$ 80,00</option>
                <option value="300">Família (5 pessoas) - R$ 300,00</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px;">
            <div class="form-group" style="flex: 1;">
                <label for="checkin">Check-in:</label>
                <input type="date" id="checkin">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="checkout">Check-out:</label>
                <input type="date" id="checkout">
            </div>
        </div>

        <div class="price-display" id="resultado">
            Preencha as datas para ver o valor
        </div>

        <button type="button" id="btnReservar" class="btn-reservar" onclick="processarReserva()">Enviar Reserva e Salvar</button>
    </form>

    <div class="info-section">
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 5px;">Em dúvida sobre as acomodações?</p>
        <button type="button" class="btn-info" onclick="verDescricaoQuartos()">Ver descrição de quartos</button>
    </div>
</div>

<script>
    // URL Mestre atualizada
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxEOpKJ93vcP_vumWIZbv5yJX5zt4JZex94I9UvojTCu7RBin4_22d4n9zCLvuBAfRN-A/exec';
    const telefoneWhatsApp = "7481042665"; 

    const inputCheckin = document.getElementById('checkin');
    const inputCheckout = document.getElementById('checkout');
    const inputQuarto = document.getElementById('tipoQuarto');
    const displayResultado = document.getElementById('resultado');
    const inputDoc = document.getElementById('documento');

    // --- MÁSCARA AUTOMÁTICA INTELIGENTE (SÓ NÚMEROS) ---
    inputDoc.addEventListener('input', function(e) {
        let valor = e.target.value.replace(/\D/g, ''); // Remove o que não for número na hora
        const tipoDoc = document.querySelector('input[name="tipoDoc"]:checked').value;

        if (tipoDoc === 'CPF') {
            if (valor.length > 11) valor = valor.slice(0, 11);
            valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
            valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
            valor = valor.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        } else {
            if (valor.length > 14) valor = valor.slice(0, 14);
            valor = valor.replace(/(\d{2})(\d)/, '$1.$2');
            valor = valor.replace(/(\d{3})(\d)/, '$1.$2');
            valor = valor.replace(/(\d{3})(\d)/, '$1/$2');
            valor = valor.replace(/(\d{4})(\d{1,2})$/, '$1-$2');
        }
        e.target.value = valor;
    });

    function verificarDocumento() {
        const tipoDoc = document.querySelector('input[name="tipoDoc"]:checked').value;
        const divNF = document.getElementById('divNotaFiscal');
        const labelDoc = document.getElementById('labelDocumento');
        
        inputDoc.value = ''; // Limpa o campo ao trocar o tipo para evitar formatação errada

        if (tipoDoc === 'CNPJ') {
            divNF.style.display = 'block';
            labelDoc.innerText = 'CNPJ:';
            inputDoc.placeholder = '00.000.000/0000-00';
            inputDoc.maxLength = 18;
        } else {
            divNF.style.display = 'none';
            labelDoc.innerText = 'CPF:';
            inputDoc.placeholder = '000.000.000-00';
            inputDoc.maxLength = 14;
            document.getElementById('notaFiscal').value = 'Não';
        }
    }

    function calcularPreco() {
        const dataIn = new Date(inputCheckin.value);
        const dataOut = new Date(inputCheckout.value);
        const precoDiaria = parseFloat(inputQuarto.value);

        if (dataIn && dataOut && dataOut > dataIn) {
            const diffTime = Math.abs(dataOut - dataIn);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            const total = diffDays * precoDiaria;

            displayResultado.innerHTML = `Total: ${diffDays} diária(s) <br> <span style="font-size: 1.2rem; color: #d4af37;">R$ ${total.toFixed(2)}</span>`;
            return { total, diffDays };
        } else {
            displayResultado.innerHTML = "Selecione datas válidas";
            return null;
        }
    }

    [inputCheckin, inputCheckout, inputQuarto].forEach(el => {
        el.addEventListener('change', calcularPreco);
    });

    // AUTO-PREENCHIMENTO DO NOME CASO O USUÁRIO ESTEJA LOGADO
    window.onload = function() {
        const usuarioLogado = JSON.parse(localStorage.getItem('hotel_usuario'));
        if(usuarioLogado && usuarioLogado.nome) {
            document.getElementById('nome').value = usuarioLogado.nome;
            if(usuarioLogado.cpf) {
                document.getElementById('documento').value = usuarioLogado.cpf;
            }
        }
    }

    function processarReserva() {
        const nome = document.getElementById('nome').value;
        const tipoDoc = document.querySelector('input[name="tipoDoc"]:checked').value;
        const documento = inputDoc.value;
        const endereco = document.getElementById('endereco').value;
        const notaFiscal = document.getElementById('notaFiscal').value;
        const info = calcularPreco();

        if (!nome || !documento || !endereco || !info) {
            alert("Por favor, preencha os dados corretamente e escolha datas válidas.");
            return;
        }
        
        const btn = document.getElementById('btnReservar');
        btn.disabled = true;
        btn.innerText = "Verificando disponibilidade...";

        const dadosReserva = {
            acao: 'nova',
            nome: nome,
            tipoDoc: tipoDoc,
            documento: documento,
            notaFiscal: tipoDoc === 'CNPJ' ? notaFiscal : 'N/A',
            endereco: endereco,
            quarto: inputQuarto.options[inputQuarto.selectedIndex].text,
            checkin: inputCheckin.value,
            checkout: inputCheckout.value,
            diarias: info.diffDays,
            valorTotal: info.total
        };

        fetch(scriptURL, {
            method: 'POST',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(dadosReserva)
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === 'erro') {
                alert(data.erro || data.mensagem);
                btn.disabled = false;
                btn.innerText = "Enviar Reserva e Salvar";
            } else {
                let texto = `*NOVA RESERVA - HOTEL RUI BARBOSA*\n\nHóspede: ${nome}\n${tipoDoc}: ${documento}\nCheck-in: ${inputCheckin.value.split('-').reverse().join('/')}\nCheck-out: ${inputCheckout.value.split('-').reverse().join('/')}\nQuarto: ${inputQuarto.options[inputQuarto.selectedIndex].text}\n*VALOR TOTAL:* R$ ${info.total.toFixed(2)}`;
                
                const url_zap = `https://api.whatsapp.com/send?phone=55${telefoneWhatsApp}&text=${encodeURIComponent(texto)}`;
                
                // O segredo contra bloqueadores de Pop-Up: Mudar a página atual em vez de tentar abrir uma nova aba
                window.location.href = url_zap; 
                
                document.getElementById('reservaForm').reset();
                displayResultado.innerHTML = "Preencha as datas para ver o valor";
                btn.disabled = false;
                btn.innerText = "Enviar Reserva e Salvar";
            }
        })
        .catch(error => {
            console.error(error);
            alert("Ocorreu um erro ao comunicar com a planilha. Tente novamente.");
            btn.disabled = false;
            btn.innerText = "Enviar Reserva e Salvar";
        });
    }

    function verDescricaoQuartos() {
        window.location.href = "home.html";
    }
</script>

</body>
</html>
