<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Situação da Reserva - Hotel Rui Barbosa</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37;
            --light: #f4f4f4;
            --info: #3498db;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .logo-hotel {
            display: block;
            margin: 0 auto 15px auto;
            width: 100px; 
            height: 100px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid var(--accent); 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }

        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            color: #555;
            font-size: 0.9rem;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-buscar { background-color: var(--primary); margin-top: 10px; }
        .btn-buscar:hover { background-color: #1a252f; }
        
        .btn-voltar {
            background-color: transparent;
            color: #666;
            border: 1px solid #ccc;
            margin-top: 15px;
        }

        .resultado-box {
            display: none;
            background: #e8f4fd;
            border: 1px solid #bce8f1;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
            text-align: left;
            line-height: 1.6;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: bold;
            color: white;
            display: inline-block;
        }
        .badge.pendente { background-color: #f39c12; }
        .badge.confirmada { background-color: #27ae60; }
        .badge.finalizada { background-color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <img src="538039459_17955489224988515_3782912898807194527_n.jpg" alt="Logo Hotel Rui Barbosa" class="logo-hotel">
    
    <h2>Situação da Reserva</h2>
    <p style="color: #666; font-size: 0.9rem; margin-bottom: 20px;">Preencha os dados abaixo para consultar o status da sua hospedagem.</p>
    
    <div class="form-group">
        <label for="termoBusca">Seu Nome ou CPF/CNPJ:</label>
        <input type="text" id="termoBusca" placeholder="Ex: João da Silva ou 11122233344">
    </div>

    <div class="form-group">
        <label for="dataCheckin">Data do seu Check-in:</label>
        <input type="date" id="dataCheckin">
    </div>
    
    <button class="btn-buscar" id="btnBuscar" onclick="buscarReserva()">Consultar Agora</button>

    <div id="resultadoBox" class="resultado-box"></div>
    
    <button class="btn-voltar" onclick="window.location.href='index.html'">Fazer Nova Reserva</button>
</div>

<script>
    // --- COLE A SUA URL DO GOOGLE AQUI ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzpcy0mSQ_ZH6aW-rrsGOlVEXMaZ148mZdSCFc1so4e90r5PR3y_qTRLhGZnPmTi-2z-g/exec';

    function buscarReserva() {
        const termo = document.getElementById('termoBusca').value.trim();
        const dataIn = document.getElementById('dataCheckin').value;
        const btn = document.getElementById('btnBuscar');

        if(!termo || !dataIn) { 
            alert("Por favor, preencha o Nome/Documento e também a Data de Check-in."); 
            return; 
        }

        const box = document.getElementById('resultadoBox');
        
        box.style.display = 'block';
        box.innerHTML = '<div style="text-align:center;"><i>Buscando informações... aguarde.</i></div>';
        
        btn.disabled = true;
        btn.innerText = "Consultando...";

        // Envia o termo e a data para a planilha
        fetch(`${scriptURL}?termo=${encodeURIComponent(termo)}&data=${encodeURIComponent(dataIn)}`)
            .then(response => response.json())
            .then(dados => {
                if(dados.encontrado) {
                    
                    // Formata as datas para exibir bonito na tela (Dia/Mês/Ano)
                    const checkinFormatado = new Date(dados.checkin).toLocaleDateString('pt-BR');
                    const checkoutFormatado = new Date(dados.checkout).toLocaleDateString('pt-BR');
                    
                    let classeBadge = dados.status.toLowerCase();

                    let html = `<strong style="color: var(--primary);">Reserva Localizada!</strong><br><br>
                                <strong>Hóspede:</strong> ${dados.nome}<br>
                                <strong>Acomodação:</strong> ${dados.quarto}<br>
                                <strong>Período:</strong> ${checkinFormatado} até ${checkoutFormatado}<br><br>
                                <strong>Status:</strong> <span class="badge ${classeBadge}">${dados.status}</span>`;
                    
                    box.innerHTML = html;
                } else {
                    box.innerHTML = `<div style="text-align:center;"><span style="color: #e74c3c; font-weight: bold;">Nenhuma reserva encontrada.</span><br><br><span style="font-size: 0.9rem;">Verifique se o nome, documento ou a data de check-in foram digitados exatamente como na reserva.</span></div>`;
                }
                
                btn.disabled = false;
                btn.innerText = "Consultar Novamente";
            })
            .catch(erro => {
                box.innerHTML = `Erro de conexão. Tente novamente.`;
                btn.disabled = false;
                btn.innerText = "Consultar Agora";
            });
    }
</script>

</body>
</html>
