<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Confirmar Reservas</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37;
            --light: #f4f4f4;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 { 
            color: var(--primary); 
            border-bottom: 2px solid var(--accent); 
            padding-bottom: 10px; 
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-buscar { background-color: var(--primary); margin-bottom: 15px; }
        .btn-buscar:hover { background-color: #1a252f; }
        
        .btn-confirmar { background-color: var(--success); display: none; margin-top: 15px;}
        .btn-confirmar:hover { background-color: #2ecc71; }

        .btn-voltar {
            background-color: transparent;
            color: #666;
            border: 1px solid #ccc;
            margin-top: 15px;
        }

        .resultado-box {
            display: none;
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            text-align: left;
        }

        .badge {
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
        }
        .badge.pendente { background-color: #f39c12; }
        .badge.confirmada { background-color: #27ae60; }
        .badge.finalizada { background-color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>Painel da Recepção</h2>
    <p style="color: #666; font-size: 0.9rem;">Busque pelo Nome ou CPF/CNPJ do hóspede para gerenciar a reserva.</p>
    
    <input type="text" id="termoBusca" placeholder="Nome ou CPF/CNPJ">
    
    <button class="btn-buscar" onclick="buscarReserva()">Localizar</button>

    <div id="resultadoBox" class="resultado-box"></div>

    <button id="btnConfirmarReserva" class="btn-confirmar" onclick="confirmarReserva()">Confirmar Reserva</button>
    
    <button class="btn-voltar" onclick="window.location.href='index.html'">Voltar para a página inicial</button>
</div>

<script>
    // --- COLE A SUA URL DO GOOGLE AQUI ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbynCm32RVshY1YcroUIcScvu-QL03kJleELWkpZtNNPKrhhu3aljpetOAO0ESoYotGjmg/exec';
    
    let termoAtual = "";

    function buscarReserva() {
        const termo = document.getElementById('termoBusca').value.trim();
        if(!termo) { alert("Digite um Nome ou Documento."); return; }

        const box = document.getElementById('resultadoBox');
        const btnConfirmar = document.getElementById('btnConfirmarReserva');
        
        box.style.display = 'block';
        box.innerHTML = '<i>Buscando na planilha... aguarde.</i>';
        btnConfirmar.style.display = 'none';

        fetch(`${scriptURL}?termo=${encodeURIComponent(termo)}`)
            .then(response => response.json())
            .then(dados => {
                if(dados.encontrado) {
                    termoAtual = termo; 
                    
                    // Formata a data de Check-out para exibir no painel
                    const dataOutObj = new Date(dados.checkout);
                    const checkoutFormatado = dataOutObj.toLocaleDateString('pt-BR');
                    
                    let classeBadge = dados.status.toLowerCase();

                    let html = `<strong>Hóspede:</strong> ${dados.nome}<br>
                                <strong>Quarto:</strong> ${dados.quarto}<br>
                                <strong>Check-in:</strong> ${dados.checkin}<br>
                                <strong>Check-out:</strong> ${checkoutFormatado}<br>
                                <strong>Status:</strong> <span class="badge ${classeBadge}">${dados.status}</span>`;
                    
                    box.innerHTML = html;

                    // Se estiver Pendente, mostra o botão verde de Confirmar
                    if(dados.status === 'Pendente') {
                        btnConfirmar.style.display = 'block';
                    } else if(dados.status === 'Confirmada') {
                        box.innerHTML += `<br><br><span style="color: #27ae60;">Atenção: Esta reserva já foi confirmada anteriormente.</span>`;
                    }
                } else {
                    box.innerHTML = `<span style="color: #e74c3c;">Reserva não encontrada.</span> Verifique se digitou corretamente.`;
                }
            })
            .catch(erro => {
                box.innerHTML = `Erro de conexão. Tente novamente.`;
            });
    }

    function confirmarReserva() {
        if(!confirm("Deseja alterar o status desta reserva para CONFIRMADA?")) return;

        const dadosConfirmacao = {
            acao: 'confirmar',
            termo: termoAtual
        };

        const box = document.getElementById('resultadoBox');
        box.innerHTML = '<i>Atualizando planilha... aguarde.</i>';
        document.getElementById('btnConfirmarReserva').style.display = 'none';

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dadosConfirmacao)
        }).then(() => {
            box.innerHTML = `<span style="color: #27ae60; font-weight: bold;">✅ Reserva Confirmada com sucesso!</span><br>A planilha foi atualizada.`;
        }).catch(() => {
            alert("Ocorreu um erro de comunicação com o Google.");
        });
    }
</script>

</body>
</html>
