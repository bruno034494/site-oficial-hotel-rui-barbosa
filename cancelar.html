<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancelar Reserva - Hotel Rui Barbosa</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d4af37;
            --light: #f4f4f4;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        h2 { color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-buscar { background-color: var(--primary); margin-bottom: 15px; }
        .btn-buscar:hover { background-color: #1a252f; }
        
        .btn-cancelar { background-color: var(--danger); display: none; margin-top: 15px;}
        .btn-cancelar:hover { background-color: #c0392b; }

        .btn-voltar {
            background-color: transparent;
            color: #666;
            border: 1px solid #ccc;
            margin-top: 10px;
        }

        .resultado-box {
            display: none;
            background: #e8f4fd;
            padding: 15px;
            border-radius: 5px;
            margin: 15px 0;
            text-align: left;
        }

        .suporte-box {
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid #eee;
            font-size: 0.9rem;
            color: #666;
        }
        
        .suporte-box a {
            color: #25d366;
            font-weight: bold;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Localizar Reserva</h2>
    <p style="color: #666; font-size: 0.9rem;">Digite o seu Nome Completo (exatamente como registrou) ou o seu CPF/CNPJ.</p>
    
    <input type="text" id="termoBusca" placeholder="Ex: João da Silva ou 11122233344">
    
    <button class="btn-buscar" onclick="buscarReserva()">Buscar Minha Reserva</button>

    <div id="resultadoBox" class="resultado-box">
        </div>

    <button id="btnConfirmarCancelamento" class="btn-cancelar" onclick="confirmarCancelamento()">Confirmar Cancelamento</button>
    
    <button class="btn-voltar" onclick="window.location.href='index.html'">Voltar para a página inicial</button>

    <div class="suporte-box">
        Não encontrou sua reserva ou precisa de ajuda?<br>
        <a id="linkSuporte" href="#" target="_blank">Falar com o Suporte (WhatsApp)</a>
    </div>
</div>

<script>
    // --- COLE A SUA URL DO GOOGLE AQUI ---
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyiNHKlzy4JBL9GN6dty1eVD6UBEh9cA-igQb-GCqCt2-FM6XU3J6_gZjF38X96hx24Iw/exec';
    const numeroSuporte = "5500999999999"; // Substitua pelo número real
    
    // Configura o link do suporte
    document.getElementById('linkSuporte').href = `https://api.whatsapp.com/send?phone=${numeroSuporte}&text=Ol%C3%A1,%20preciso%20de%20ajuda%20com%20minha%20reserva.`;

    let termoAtual = "";

    function buscarReserva() {
        const termo = document.getElementById('termoBusca').value.trim();
        if(!termo) { alert("Por favor, digite um Nome ou Documento."); return; }

        const box = document.getElementById('resultadoBox');
        const btnCancelar = document.getElementById('btnConfirmarCancelamento');
        
        box.style.display = 'block';
        box.innerHTML = '<i>Buscando... aguarde.</i>';
        btnCancelar.style.display = 'none';

        // Faz a busca usando o método GET
        fetch(`${scriptURL}?termo=${encodeURIComponent(termo)}`)
            .then(response => response.json())
            .then(dados => {
                if(dados.encontrado) {
                    termoAtual = termo; // Guarda para usar no cancelamento
                    
                    let html = `<strong>Hóspede:</strong> ${dados.nome}<br>
                                <strong>Quarto:</strong> ${dados.quarto}<br>
                                <strong>Check-in:</strong> ${dados.checkin}<br>
                                <strong>Status:</strong> <b>${dados.status}</b>`;
                    
                    box.innerHTML = html;

                    if(dados.status === 'Cancelada') {
                        box.innerHTML += `<br><br><span style="color: var(--danger);">Esta reserva já encontra-se cancelada.</span>`;
                    } else {
                        btnCancelar.style.display = 'block'; // Mostra o botão se não estiver cancelada
                    }
                } else {
                    box.innerHTML = `<span style="color: var(--danger);">Reserva não encontrada.</span> Verifique se digitou corretamente ou contate o suporte abaixo.`;
                }
            })
            .catch(erro => {
                box.innerHTML = `Erro de conexão. Tente novamente.`;
            });
    }

    function confirmarCancelamento() {
        if(!confirm("Tem certeza absoluta que deseja cancelar esta reserva?")) return;

        const dadosCancelamento = {
            acao: 'cancelar',
            termo: termoAtual
        };

        const box = document.getElementById('resultadoBox');
        box.innerHTML = '<i>Processando cancelamento... aguarde.</i>';
        document.getElementById('btnConfirmarCancelamento').style.display = 'none';

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dadosCancelamento)
        }).then(() => {
            box.innerHTML = `<span style="color: #25d366; font-weight: bold;">✅ Reserva Cancelada com sucesso!</span><br>O status foi atualizado em nosso sistema.`;
        }).catch(() => {
            alert("Ocorreu um erro. Por favor, contate o suporte.");
        });
    }
</script>

</body>
</html>
